<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; touch-action: none; } /* Disables browser zoom/scroll lag */
        #ui {
            position: fixed; top: 10px; left: 10px; color: #ff0033;
            font-family: monospace; font-size: 10px; pointer-events: none;
            text-shadow: 0 0 5px #ff0033; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui">HEART_STABILITY: <span id="percent">100</span>% <br> CATCHES: <span id="score">0</span>/3</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const percentEl = document.getElementById('percent');

        let width, height, heartX, heartY, score = 0, stability = 100;
        let heartSize = 50;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            spawnHeart();
        }

        function spawnHeart() {
            heartX = Math.random() * (width - heartSize) + heartSize/2;
            heartY = Math.random() * (height - heartSize) + heartSize/2;
        }

        // Optimized Teleport (Moves every 400ms)
        setInterval(() => {
            if (score < 3) spawnHeart();
        }, 450);

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, width, height);

            // 90s Film Grain (Directly drawn for speed)
            for (let i = 0; i < 500; i++) {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.05})`;
                ctx.fillRect(Math.random() * width, Math.random() * height, 1, 1);
            }

            if (score < 3) {
                // The Heart
                ctx.font = `${heartSize}px serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff0033";
                ctx.fillStyle = "#ff0033";
                ctx.fillText("❤", heartX, heartY);
                
                // Stability decay
                stability -= 0.05;
                percentEl.innerText = Math.floor(stability);
            } else {
                // WIN SCREEN
                ctx.shadowBlur = 20;
                ctx.fillStyle = "white";
                ctx.font = "20px monospace";
                ctx.fillText("I_AM_POSSESSED_BY_YOU", width/2, height/2);
                ctx.fillStyle = "#ff0033";
                ctx.font = "12px monospace";
                ctx.fillText("CONNECTION_PERMANENT", width/2, height/2 + 40);
            }

            if (stability <= 0 && score < 3) {
                ctx.fillStyle = "white";
                ctx.fillText("LOVE_LOST", width/2, height/2);
            } else {
                requestAnimationFrame(draw);
            }
        }

        // Instant Touch Detection (No 300ms delay)
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const dx = touch.clientX - heartX;
            const dy = touch.clientY - heartY;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < heartSize) {
                score++;
                scoreEl.innerText = score;
                stability = Math.min(stability + 20, 100);
                spawnHeart();
                
                // Haptic Feedback (if mobile supports it)
                if (navigator.vibrate) navigator.vibrate(50);
            }
        }, { passive: true });

        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
