<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { 
            background: #000; color: #ff0033; 
            font-family: 'Courier New', monospace; 
            overflow: hidden; margin: 0; cursor: none;
        }

        #noise {
            position: fixed; inset: 0;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Noise_Texture.png');
            opacity: 0.1; pointer-events: none; z-index: 100;
        }

        #heart {
            position: absolute; font-size: 50px; cursor: pointer;
            text-shadow: 0 0 15px #ff0033;
            z-index: 50; user-select: none;
            /* REMOVED TRANSITIONS FOR INSTANT SNAPPING */
            will-change: transform, left, top;
        }

        .glitch-flash {
            position: fixed; inset: 0;
            background: rgba(255, 0, 0, 0.05);
            pointer-events: none; display: none; z-index: 1;
        }

        #custom-cursor {
            width: 10px; height: 10px; background: #fff;
            position: fixed; pointer-events: none; z-index: 1000;
            box-shadow: 0 0 15px #ff0033;
        }

        #ui-text {
            position: fixed; top: 20px; left: 20px; font-size: 10px; opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="noise"></div>
    <div id="custom-cursor"></div>
    <div id="glitch-bg" class="glitch-flash"></div>
    <div id="ui-text">SYSTEM_LINK: ESTABLISHED // TARGET: HER_HEART</div>
    <div id="heart">❤</div>

    <script>
        const heart = document.getElementById('heart');
        const cursor = document.getElementById('custom-cursor');
        const flash = document.getElementById('glitch-bg');
        
        let hX = window.innerWidth / 2;
        let hY = window.innerHeight / 2;
        let caughtCount = 0;

        // 1. INSTANT RANDOM MOVEMENT (No Lag)
        function teleport() {
            hX = Math.random() * (window.innerWidth - 60);
            hY = Math.random() * (window.innerHeight - 60);
            
            heart.style.left = hX + 'px';
            heart.style.top = hY + 'px';
            
            // Fast erratic scaling
            const scale = 0.8 + Math.random() * 1.5;
            const rot = (Math.random() - 0.5) * 60;
            heart.style.transform = `scale(${scale}) rotate(${rot}deg)`;

            // High-speed repositioning
            setTimeout(teleport, 150 + Math.random() * 300);
        }
        teleport();

        // 2. CURSOR FOLLOW (Zero Latency)
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // Logic to make background flicker when close
            const dist = Math.hypot(hX - e.clientX, hY - e.clientY);
            if (dist < 150) {
                flash.style.display = 'block';
                if(Math.random() > 0.8) heart.innerText = "MINE";
            } else {
                flash.style.display = 'none';
                heart.innerText = "❤";
            }
        });

        // 3. THE "POSSESSED" DODGE
        // If she gets too close without clicking, it jumps!
        document.addEventListener('mousemove', (e) => {
            const dist = Math.hypot(hX - e.clientX, hY - e.clientY);
            if (dist < 80) {
                hX = Math.random() * (window.innerWidth - 60);
                hY = Math.random() * (window.innerHeight - 60);
                heart.style.left = hX + 'px';
                heart.style.top = hY + 'px';
            }
        });

        // 4. THE CATCH
        heart.addEventListener('mousedown', (e) => {
            caughtCount++;
            
            // Visual feedback for catch
            document.body.style.backgroundColor = "#ff0033";
            setTimeout(() => document.body.style.backgroundColor = "#000", 50);

            if (caughtCount >= 3) {
                document.body.innerHTML = `
                    <div style="text-align:center; margin-top:20%;">
                        <h1 style="color:white; font-size:4rem; text-shadow: 0 0 20px red;">I_AM_POSSESSED_BY_YOU</h1>
                        <p style="letter-spacing:15px; color:#ff0033;">CONNECTION_PERMANENT</p>
                    </div>
                `;
                document.title = "LOCKED_IN_LOVE";
            }
        });
    </script>
</body>
</html>
